spring:
  application:
    name: ai-recommendation-service
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=2000,expireAfterWrite=120s

server:
  port: 8092
  servlet:
    context-path: /ai-service-ms

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Food delivery platform integration (User / Order / Restaurant services)
app:
  integration:
    # mock = in-memory fixtures shaped like real REST payloads; live = call peer services
    mode: ${INTEGRATION_MODE:mock}
    user-service-base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
    order-service-base-url: ${ORDER_SERVICE_BASE_URL:http://localhost:8082}
    restaurant-service-base-url: ${RESTAURANT_SERVICE_BASE_URL:http://localhost:8083}
    rest:
      connect-timeout-ms: 2000
      read-timeout-ms: 5000
  security:
    jwt:
      # HS256 — must match the auth issuer (same secret as User/Identity service in dev)
      # Override in production via JWT_SECRET (never ship the dev default)
      secret: ${JWT_SECRET:01234567890123456789012345678901}
      # Subject claim must be the user's UUID string
      subject-claim: sub

  # OpenAI-compatible /v1/chat/completions (Groq free tier API key, or local Ollama)
  llm:
    enabled: ${LLM_ENABLED:false}
    base-url: ${LLM_BASE_URL:https://api.groq.com/openai/v1}
    api-key: ${GROQ_API_KEY:}
    model: ${LLM_MODEL:llama-3.1-8b-instant}
    read-timeout-ms: ${LLM_READ_TIMEOUT_MS:90000}
    system-prompt: ""
