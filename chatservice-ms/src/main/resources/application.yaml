spring:
  application:
    name: chatservice-ms

  datasource:
    url: jdbc:mysql://localhost:3306/menuservice
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db-changelog.yaml

server:
  port: 8090
  servlet:
    context-path: /chatservice-ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    internal-token: change-me