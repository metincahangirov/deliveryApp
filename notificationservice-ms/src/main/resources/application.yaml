spring:
  application:
    name: notificationservice-ms

  datasource:
    # createDatabaseIfNotExist=true — MySQL-də sxem yoxdursa avtomatik yaradır (əl ilə CREATE DATABASE lazım deyil).
    url: jdbc:mysql://localhost:3306/notificationservice?createDatabaseIfNotExist=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db-changelog.yaml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8088
  servlet:
    context-path: /notificationservice-ms

app:
  jwt:
    secret: "notificationservice-dev-secret-key-min-32-chars!!"
    expiration-ms: 86400000

  security:
    internal-token: ${APP_INTERNAL_TOKEN:}
