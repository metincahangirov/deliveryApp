spring:
  datasource:
    url: jdbc:h2:mem:notifications_test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  jwt:
    secret: "notificationservice-test-secret-key-32chars!"
    expiration-ms: 3600000
  security:
    internal-token: test-internal-token
